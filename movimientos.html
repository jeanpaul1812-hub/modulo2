<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mani Bank | Movimientos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #004a99; --secondary: #f4f7f6; --accent: #00a86b; --danger: #ff4d4d; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--secondary); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--primary); margin: 0; }
        .sub { color: #666; font-size: 0.9em; margin-top: 5px; }
        .saldo-card { background: var(--accent); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0, 168, 107, 0.3); }
        .nav-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        ul { list-style: none; padding: 0; }
        li { background: #f9f9f9; padding: 10px; margin-bottom: 8px; border-radius: 8px; border-left: 4px solid var(--accent); font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Mani Bank</h1>
        <p class="sub">Historial de Movimientos</p>
    </header>

    <div class="saldocard bg-success text-white p-3 rounded text-center mb-3">
        <small>Saldo Disponible</small>
        <h1 id="saldo">$0.00</h1>
    </div>

    <div class="nav-menu">
        <button class="btn btn-secondary" onclick="location.href='ingresos.html'">Ingresos</button>
        <button class="btn btn-secondary" onclick="location.href='salidas.html'">Salidas</button>
        <button class="btn btn-secondary" onclick="location.href='clientes.html'">Clientes</button>
        <button class="btn btn-primary active" onclick="location.href='movimientos.html'">Movimientos</button>
    </div>

    <div class="section mb-3">
        <ul id="history-list"></ul>
    </div>

    <button class="btn btn-danger w-100" onclick="logout()">Cerrar Sesión</button>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    if (!localStorage.getItem('auth')) window.location.href = 'index.html';

    let balance = parseFloat(localStorage.getItem('balance')) || 0;
    let history = JSON.parse(localStorage.getItem('history')) || [];
    
    $('#saldo').text("$" + balance.toFixed(2));
    
    const historyList = $('#history-list');
    history.forEach(h => {
        historyList.append(`<li class="mb-2 p-2 border-start border-success border-4 bg-light rounded">${h}</li>`);
    });

    function logout() {
        localStorage.removeItem('auth');
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
