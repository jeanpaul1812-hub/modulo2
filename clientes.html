<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mani Bank | Clientes</title>
    <style>
        :root { --primary: #004a99; --secondary: #f4f7f6; --accent: #00a86b; --danger: #ff4d4d; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--secondary); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--primary); margin: 0; }
        .sub { color: #666; font-size: 0.9em; margin-top: 5px; }
        .saldo-card { background: var(--accent); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0, 168, 107, 0.3); }
        .nav-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        button { padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-main { background: var(--primary); color: white; width: 100%; }
        .btn-nav { background: #e0e0e0; }
        .btn-logout { background: #ff4d4d; color: white; margin-top: 20px; width: 100%; }
        .btn-delete { background: var(--danger); color: white; margin-top: 8px; width: 100%; padding: 5px; font-size: 0.8em; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        ul { list-style: none; padding: 0; }
        li { background: #f9f9f9; padding: 10px; margin-bottom: 8px; border-radius: 8px; border-left: 4px solid var(--accent); font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Mani Bank</h1>
        <p class="sub">Directorio de Clientes</p>
    </header>

    <div class="saldo-card">
        <small>Saldo Disponible</small>
        <h1 id="saldo">$0.00</h1>
    </div>

    <div class="nav-menu">
        <button class="btn-nav" onclick="location.href='ingresos.html'">Ingresos</button>
        <button class="btn-nav" onclick="location.href='salidas.html'">Salidas</button>
        <button class="btn-nav active" onclick="location.href='clientes.html'">Clientes</button>
        <button class="btn-nav" onclick="location.href='movimientos.html'">Movimientos</button>
    </div>

    <div class="section">
        <input type="text" id="cName" placeholder="Nombre">
        <input type="text" id="cRut" placeholder="RUT">
        <input type="text" id="cCta" placeholder="N° Cuenta">
        <input type="text" id="cBanco" placeholder="Banco">
        <button class="btn-main" onclick="addContact()">Guardar Cliente</button>
        <ul id="contact-list"></ul>
    </div>

    <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
</div>

<script>
    if (!localStorage.getItem('auth')) window.location.href = 'index.html';

    let balance = parseFloat(localStorage.getItem('balance')) || 0;
    let contacts = JSON.parse(localStorage.getItem('contacts')) || [];
    
    document.getElementById('saldo').innerText = "$" + balance.toFixed(2);
    renderContacts();

    function addContact() {
        const newClient = { 
            nombre: document.getElementById('cName').value, 
            rut: document.getElementById('cRut').value, 
            cta: document.getElementById('cCta').value, 
            banco: document.getElementById('cBanco').value 
        };
        if (newClient.nombre) {
            contacts.push(newClient);
            localStorage.setItem('contacts', JSON.stringify(contacts));
            renderContacts();
            document.getElementById('cName').value = '';
            document.getElementById('cRut').value = '';
            document.getElementById('cCta').value = '';
            document.getElementById('cBanco').value = '';
        } else {
            alert('Por favor ingrese un nombre.');
        }
    }

    function renderContacts() {
        const contactList = document.getElementById('contact-list');
        contactList.innerHTML = ''; 
        contacts.forEach((c, i) => {
            contactList.innerHTML += `<li>
                <strong>${c.nombre}</strong><br>${c.banco} | CTA: ${c.cta}
                <button class="btn-delete" onclick="removeContact(${i})">Eliminar Cliente</button>
            </li>`;
        });
    }

    function removeContact(index) {
        contacts.splice(index, 1);
        localStorage.setItem('contacts', JSON.stringify(contacts));
        renderContacts();
    }

    function logout() {
        localStorage.removeItem('auth');
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
