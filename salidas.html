<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mani Bank | Salidas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #004a99; --secondary: #f4f7f6; --accent: #00a86b; --danger: #ff4d4d; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--secondary); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--primary); margin: 0; }
        .sub { color: #666; font-size: 0.9em; margin-top: 5px; }
        .saldo-card { background: var(--accent); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0, 168, 107, 0.3); }
        .nav-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Mani Bank</h1>
        <p class="sub">Salidas / Envios</p>
    </header>

    <div class="saldo-card">
        <small>Saldo Disponible</small>
        <h1 id="saldo">$0.00</h1>
    </div>

    <div class="nav-menu">
        <button class="btn btn-secondary" onclick="location.href='ingresos.html'">Ingresos</button>
        <button class="btn btn-primary active" onclick="location.href='salidas.html'">Salidas</button>
        <button class="btn btn-secondary" onclick="location.href='clientes.html'">Clientes</button>
        <button class="btn btn-secondary" onclick="location.href='movimientos.html'">Movimientos</button>
    </div>

    <div class="section mb-3">
        <select id="recipient-select" class="form-select mb-2"></select>
        <input type="number" id="amount" class="form-control mb-2" placeholder="Monto a enviar">
        <button class="btn btn-primary w-100" onclick="transfer()">Realizar Envío</button>
    </div>

    <button class="btn btn-danger w-100" onclick="logout()">Cerrar Sesión</button>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    if (!localStorage.getItem('auth')) window.location.href = 'index.html';

    let balance = parseFloat(localStorage.getItem('balance')) || 0;
    let contacts = JSON.parse(localStorage.getItem('contacts')) || [];
    let history = JSON.parse(localStorage.getItem('history')) || [];
    
    $('#saldo').text("$" + balance.toFixed(2));

    const select = $('#recipient-select');
    select.html('<option value="">Seleccione cliente...</option>');
    contacts.forEach((c, i) => {
        select.append(`<option value="${i}">${c.nombre}</option>`);
    });

    function transfer() {
        const amount = parseFloat($('#amount').val());
        const index = select.val();
        if (amount > 0 && amount <= balance && index !== "") {
            balance -= amount;
            history.unshift(`SALIDA: -$${amount} a ${contacts[index].nombre}`);
            
            localStorage.setItem('balance', balance);
            localStorage.setItem('history', JSON.stringify(history));
            $('#amount').val('');
            $('#saldo').text("$" + balance.toFixed(2));
            alert('Transferencia realizada exitosamente');
        } else { 
            alert("Saldo insuficiente o datos inválidos"); 
        }
    }

    function logout() {
        localStorage.removeItem('auth');
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
