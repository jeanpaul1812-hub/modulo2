<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mani Bank | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #004a99; --secondary: #f4f7f6; --accent: #00a86b; --danger: #ff4d4d; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--secondary); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; height: 80vh; }
        .container { width: 100%; max-width: 450px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--primary); margin: 0; }
        .sub { color: #666; font-size: 0.9em; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Mani Bank</h1>
        <p class="sub">Tu billetera digital By PaulSys</p>
    </header>

    <div>
        <input type="text" id="user" class="form-control mb-3" placeholder="Usuario (jeanpaul)">
        <input type="password" id="pass" class="form-control mb-3" placeholder="Contraseña (6789)">
        <button class="btn btn-primary w-100" onclick="login()">Acceder</button>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const USER_VALID = "jeanpaul";
    const PASS_VALID = "6789";

    // Limpiar sesión anterior
    localStorage.removeItem('auth');

    function login() {
        if ($('#user').val() === USER_VALID && $('#pass').val() === PASS_VALID) {
            localStorage.setItem('auth', 'true');
            window.location.href = 'ingresos.html';
        } else { 
            alert("Usuario o contraseña incorrectos"); 
        }
    }
</script>
</body>
</html>
